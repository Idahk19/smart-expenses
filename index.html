<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen bg-gradient-to-br from-blue-100 via-purple-100 to-pink-100 flex justify-center items-center p-6">

    <div class="w-full max-w-2xl bg-white/80 backdrop-blur-md shadow-2xl rounded-3xl p-8">

        <!-- Header -->
        <div class="text-center mb-8">
            <h1 class="text-4xl font-extrabold text-gray-800">
                Smart Expenses
            </h1>
            <p class="text-gray-500 mt-2">
                Track your daily spending with ease
            </p>
        </div>

        <!-- Form -->
        <div class="space-y-4">
            <form id="expenseForm">

            <input
                type="text"
                id="description"
                placeholder="Expense"
                class="w-full p-4 rounded-xl border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:outline-none"
            ><br><br>

            <input
                type="number"
                id="amount"
                placeholder="Amount"
                class="w-full p-4 rounded-xl border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:outline-none"
            ><br><br>

            <select
                id="category"
                class="w-full p-4 rounded-xl border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:outline-none"
            >
                <option value="">Select Category</option>
                <option value="food">Food</option>
                <option value="transport">Transport</option>
                <option value="shopping">Shopping</option>
                <option value="other">Other</option>
            </select>
            <br><br>

            <button
                id="addBtn"
                class="w-full bg-gradient-to-r from-blue-600 to-purple-600 text-white py-4 rounded-xl font-semibold text-lg hover:scale-105 transition duration-300"
            >
                Add Expense
            </button>
            </form>

        </div>

        <!-- Filter -->
        <div class="mt-8">
            <label class="block mb-2 font-medium text-gray-700">
                Filter Expenses
            </label>

            <select
                id="filterCategory"
                class="w-full p-4 rounded-xl border border-gray-300"
            >
                <option value="all">All Categories</option>
                <option value="food">Food</option>
                <option value="transport">Transport</option>
                <option value="shopping">Shopping</option>
                <option value="other">Other</option>
            </select>
        </div>

        <!-- Expense List -->
        <div class="mt-6 overflow-x-auto">
        <table class="w-full border-collapse">
        <thead>
            <tr class="bg-gray-200">
                <th class="p-3 text-left">Description</th>
                <th class="p-3 text-left">Category</th>
                <th class="p-3 text-left">Amount</th>
                <th class="p-3 text-center">Action</th>
            </tr>
        </thead>

        <tbody id="expenseList">
            <!-- Expenses go here -->
        </tbody>
    </table>
</div>

        <!-- Total -->
        <div class="mt-8 bg-gradient-to-r from-green-500 to-emerald-600 text-white p-6 rounded-2xl text-center shadow-lg">
            <p class="text-lg">Total Spending</p>

            <h2 class="text-4xl font-bold mt-2">
                Ksh <span id="total">0</span>
            </h2>
        </div>

    </div>

    <!-- JS -->
    <script type="module" src="script.js"></script>
</body>
</html>
